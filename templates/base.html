<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}/cause{% endblock %}</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <nav>
        {% if messages %}
        <ul>
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        
        <a href="{% url 'writeup_list' %}"><span style="opacity:0.6;">/</span>cause</a>
        {% if user.is_authenticated %}
            <a href="{% url 'subscription_plans' %}">Subscriptions</a>
            <a href="{% url 'view_cart' %}">Cart</a>
            <span>{{ user.profile.coins }} coins</span>
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit" style="background:none; border:none; padding:0; color:blue; text-decoration:underline; cursor:pointer;">
                    Log out
                </button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Log in</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </nav>

    {% block content %}
    {% endblock %}
</body>
</html>
