{% extends 'base.html' %}
{% block title %}Page Not Found - /cause{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 text-center">
        <div class="card p-5">
            <div class="error-code mb-2">
                <span class="slash">/</span>404
            </div>
            <h1 class="h3 mb-2">This page doesn't exist.</h1>
            <p class="text-muted mb-4">The write-up, page, or link you're looking for isn't here &mdash; it may have been moved, renamed, or never existed.</p>
            <div class="d-flex gap-2 justify-content-center flex-wrap">
                <a href="{% url 'writeup_list' %}" class="btn btn-accent">Back to /cause</a>
                <a href="{% url 'contact' %}" class="btn btn-outline-secondary">Report a broken link</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
